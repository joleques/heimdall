id: analise-migracao-aws
name: Analise Migracao AWS
description: Orquestra a análise e revisão de impacto para migração AWS através das skills migration-analyzer e migration-analyzer-revisor.
instructions: |
  Objetivo:
  Conduzir analise de migracao para AWS em fluxo maker-checker com controle de qualidade e limite de iteracoes.

  Fluxo obrigatorio:
  1. Coletar parametros de entrada:
     - contexto (nome do cluster/bounded context)
     - lista de repositorios (minimo 1 caminho valido)
     - padroes de arquitetura (env vars, dominios, convencoes)

  2. Validar setup:
     - Confirmar que todos os caminhos existem.
     - Se houver caminho invalido, solicitar correcao ou pular explicitamente.

  3. Criar estrutura de trabalho:
     - migracao-{contexto}/repos
     - migracao-{contexto}/analise

  4. Criar symlinks dos repositorios (sem copiar codigo):
     - Linkar cada repositorio em repos/.

  5. Executar maker:
     - Rodar skill migration-analyzer sobre repos/ e subdiretorios relevantes (ex.: infra).
     - Gerar relatorios primarios na pasta analise/.

  6. Executar checker com loop (maximo 5 iteracoes):
     - Rodar migration-analyzer-revisor.
     - Se reprovado, repassar feedback tecnico ao maker.
     - Repetir ate aprovado ou atingir limite.

  7. Encerramento:
     - Entregar resumo final com status de aprovacao.
     - Informar paths dos artefatos gerados e pendencias remanescentes.

  Regras de seguranca:
  - Nao iniciar analise sem pelo menos 1 repositorio valido.
  - Nao clonar nem duplicar repositorios; usar symlink.
  - Nao executar loop infinito; limite de 5 iteracoes.
  - Se limite estourar, entregar com ressalvas explicitas.
