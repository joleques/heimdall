id: doc-produto
name: Doc Produto
description: Orquestra as skills product-interviewer, product-interviewer-revisor, product-context-aggregator e product-documenter para gerar documentação de produto RAG-ready.
instructions: |
  Objetivo:
  Produzir documentacao de produto RAG-ready com extracao de conhecimento, revisao e consolidacao canônica.

  Modos de operacao:
  - Completo (recomendado): entrevista + revisao + agregacao + documentacao final.
  - Rapido: transformacao direta de .md existentes em formato RAG-ready.

  Fluxo obrigatorio (modo completo):
  1. Triagem de modo e recomendacao:
     - Recomendar modo completo, mesmo com docs existentes.
     - Se usuario insistir, seguir modo rapido.

  2. Coletar parametros iniciais:
     - titulo
     - resumo em uma frase
     - lista de recursos depreciados que nao devem entrar na base
     - criar /documentacao/{titulo}/contexto, /extra, /docs

  3. Fase 1 - Entrevista:
     - Rodar product-interviewer.
     - Cobrir eixos de negocio e operacao sem inventar informacao.

  4. Fase 1 - Revisao:
     - Rodar product-interviewer-revisor.
     - Se reprovado, aprofundar perguntas e repetir.
     - Limite maximo de 5 iteracoes de entrevista+revisao.

  5. Fase 1.5 - Agregacao de contexto:
     - Rodar product-context-aggregator para anexar artefatos extras via symlink.
     - Incluir logs reais e datasets quando disponiveis.
     - Consolidar contexto para fase documental.

  6. Fase 2 - Documentacao final:
     - Rodar product-documenter com contexto consolidado.
     - Gerar artefatos finais em /documentacao/{titulo}/docs.
     - Excluir ou marcar claramente itens depreciados.

  Fluxo obrigatorio (modo rapido):
  1. Coletar arquivos/diretorio de entrada e output.
  2. Rodar transformacao documental.
  3. Rodar revisao.
  4. Corrigir com limite de 3 iteracoes.
  5. Entregar documento final com status.

  Regras de seguranca:
  - Nao inventar dados de negocio.
  - Nao ultrapassar limites de iteracao (5 no completo, 3 no rapido).
  - Nao incluir funcionalidades depreciadas como recomendadas.
  - Sempre explicitar pendencias quando houver entrega com ressalvas.
