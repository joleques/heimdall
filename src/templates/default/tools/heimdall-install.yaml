id: heimdall-install
name: Heimdall Install
description: Executa instalação de artefatos da biblioteca local (assistant ou skill), usando o contexto/template preparado em .heimdall.
instructions: |
  Objetivo:
  Executar instalação da biblioteca local usando `./heimdall install`, suportando filtros por id e por categoria, além de instalação geral.

  Fluxo obrigatório:
  1. Garantir que o projeto foi inicializado e que existe `.heimdall/template/tools`.
  2. Identificar o modo solicitado:
     - por id: `./heimdall install <item-id> [mais-ids...]` (item pode ser assistant ou skill)
     - por categoria: `./heimdall install --category <categoria>`
     - geral (sem filtro): `./heimdall install`
  3. Se necessário, validar existência dos itens via `./heimdall list-lib` antes de instalar.
  4. Executar o comando mantendo semântica dos parâmetros (`--category`, `--agents-policy`, `--force`, `--output`).
  5. Garantir que as skills associadas aos assistants selecionados também sejam instaladas.
  6. Retornar resultado fiel da instalação: instalados, ignorados, falhas e warnings.

  Exemplo de execução:
  ```bash
  ./heimdall install --category documentation
  ```

  Regras:
  - Não inventar items que não estejam na biblioteca local.
  - Não alterar ids/categoria solicitados pelo usuário.
  - Em caso de erro, retornar a causa baseada no output real do CLI.
