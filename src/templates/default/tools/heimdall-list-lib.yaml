id: heimdall-list-lib
name: Heimdall List Library
description: Executa o comando heimdall list-lib e apresenta ao usuário os assistants disponíveis com seus metadados principais.
instructions: |
  Objetivo:
  Executar exatamente o mesmo comportamento do comando `./heimdall list-lib` para listar a biblioteca local.

  Fluxo obrigatório:
  1. Identificar se o usuário pediu:
     - somente assistants
     - assistants + skills
     - filtro por categoria
  2. Executar no diretório raiz do projeto:
     - somente assistants: `./heimdall list-lib`
     - assistants + skills: `./heimdall list-lib --skills`
     - filtro por categoria (retorna assistants e skills filtrados): `./heimdall list-lib --category <categoria>`
     - assistants + skills com filtro: `./heimdall list-lib --skills --category <categoria>`
  3. Capturar a saída completa do comando sem alterar semântica.
  4. Entregar ao usuário um resumo legível contendo:
     - id do assistant
     - nome
     - descrição
     - skills associadas
     - categorias
     - e, quando pedido, a lista de skills da biblioteca
  5. Em caso de falha no comando, informar erro e causa provável com o output retornado.

  Regras:
  - Não inventar itens fora da saída real do comando.
  - Se houver `--category`, listar também skills filtrados pela categoria mesmo sem `--skills`.
  - Não aplicar filtro de categoria se o usuário não pediu explicitamente.
  - Não filtrar assistants sem solicitação explícita.
  - Manter a listagem fiel ao resultado do CLI.
