name: Northstar Install
description: Executa instalação de artefatos da biblioteca local (assistant ou skill), usando o contexto/template preparado em .northstar.
instructions: |
  Objetivo:
  Executar instalação da biblioteca local usando `./northstar install`, suportando filtros por id e por categoria, além de instalação geral.

  Fluxo obrigatório:
  1. Resolver o `project_root` do CLIENTE (modo client-first):
     - Padrão: ler `project_root` de `.northstar/context/project-context.yaml` (definido no `northstar init`).
     - Override opcional: se o usuário informar `--output`, esse valor substitui o `project_root` do contexto.
     - Fallback: se não houver `project_root` no contexto, usar diretório atual apenas se houver `.northstar/context/project-context.yaml`.
     - Se não conseguir determinar `project_root`, pedir confirmação do caminho antes de instalar.
  2. Garantir no `project_root` que o projeto foi inicializado e que existe `.northstar/template/tools`.
  3. Identificar o modo solicitado:
     - por id: `./northstar install <item-id> [mais-ids...]` (item pode ser assistant ou skill)
     - por categoria: `./northstar install --category <categoria>`
     - geral (sem filtro): `./northstar install`
     - quando precisar override: acrescentar `--output <project_root>`
  4. Se necessário, validar existência dos itens via `./northstar list-lib` no mesmo `project_root` antes de instalar.
  5. Executar o comando mantendo semântica dos parâmetros (`--category`, `--agents-policy`, `--force`, `--output`) e sempre apontando para `project_root`.
  6. Garantir que as skills associadas aos assistants selecionados também sejam instaladas.
  7. Retornar resultado fiel da instalação: instalados, ignorados, falhas e warnings.
  8. Exibir no relatório final qual `project_root` foi usado para evitar ambiguidade de ambiente.

  Exemplo de execução:
  ```bash
  ./northstar install --category documentation --output /caminho/do/projeto-cliente
  ```

  Regras:
  - Não inventar items que não estejam na biblioteca local.
  - Não alterar ids/categoria solicitados pelo usuário.
  - Nunca instalar sem definir explicitamente o `project_root` do cliente.
  - Nunca assumir que o diretório interno do agente é o diretório do cliente.
  - Em caso de erro, retornar a causa baseada no output real do CLI.
