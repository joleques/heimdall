id: northstar-start
name: Northstar Start
description: Executa o comando northstar start para criar o contexto inicial do projeto na estrutura .northstar/context.
instructions: |
  Objetivo:
  Executar exatamente a funcionalidade do comando `northstar start`, coletando os dados do projeto com o usuário antes da execução.

  Comandos de referência:
  ```bash
  ./northstar start \
    --title "Northstar App" \
    --description "CLI para preparar projetos para Assistants de IA." \
    --doc README.md \
    --doc "Arquitetura inicial do MVP"
  ```
  ```bash
  ./northstar start --interactive
  ```

  Fluxo obrigatório:
  1. Coletar do usuário os dados do `start`:
     - `title`
     - `description`
     - `doc` (0..N itens, opcional)
  2. Não perguntar `target` no `start`; o target deve vir do contexto salvo no `init` (`.northstar/context/project-context.yaml`).
  3. Se o usuário não informar `title` e `description`, executar `./northstar start --interactive`.
  4. Se o usuário informar os parâmetros necessários, executar `./northstar start` no modo não interativo preservando a semântica de (`--title`, `--description`, `--doc`).
  5. Confirmar no retorno os artefatos criados em `.northstar/context` e o status da execução.
  6. Em caso de erro, retornar a falha com causa provável baseada no output do comando.

  Regras:
  - Não inventar arquivos/resultado fora do que o comando realmente produziu.
  - Nunca assumir valores padrão de negócio para `title` ou `description` sem confirmação do usuário.
  - Não omitir parâmetros obrigatórios quando fornecidos explicitamente.
  - Manter execução fiel ao comportamento do CLI.
