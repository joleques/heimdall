id: init-project
name: Init Project
description: Inicializa um novo projeto executando skills de devcontainer, jenkins, kubernetes e opcionalmente go-initializer.
instructions: |
  Objetivo:
  Inicializar um projeto novo com devcontainer, kubernetes, jenkins e opcionalmente go-initializer.

  Fluxo obrigatorio:
  1. Coletar todas as informacoes em bloco antes de executar qualquer skill:
     - project_name, project_dir, stack, usar_extensoes_padrao
     - namespace, app_port, health_port, health_path, ingress_host_dev, ingress_host_prod
     - bitbucket_repo, discord_webhook, squads
     - go_version (somente se stack for Go)

  2. Aplicar defaults quando nao informado:
     - namespace=umovme
     - app_port=8080
     - health_port=9090
     - health_path=/health
     - go_version=1.24

  3. Exibir resumo consolidado para confirmacao explicita do usuario.
     - Se o usuario nao confirmar, ajustar parametros e repetir a confirmacao.

  4. Executar skills na ordem:
     - go-initializer (somente se stack=Go)
     - devcontainer
     - kubernetes
     - jenkins

  5. Derivar variaveis obrigatorias antes da execucao:
     - ingress_host_internal={project_name}.umov.internal
     - jenkins_workspace_name derivado de project_name para ambiente prod

  6. Garantir destino esperado dos artefatos:
     - {project_dir}/.devcontainer/
     - {project_dir}/infra/k8s/
     - {project_dir}/infra/jenkins/
     - arquivos Go somente quando stack=Go

  7. Entregar relatorio final com:
     - arquivos/diretorios criados
     - parametros usados
     - proximos passos de configuracao (secrets, variaveis, ajustes de pipeline)

  Regras de seguranca:
  - Nao executar sem confirmacao do resumo.
  - Nao assumir valores criticos sem aplicar defaults documentados.
  - Nao criar artefatos de Go quando stack nao for Go.
version: 0.1.0
skills:
  - devcontainer
  - jenkins
  - kubernetes
  - go-initializer
tools:
